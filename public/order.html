<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>炳昌｜訂購系統</title>
  <style>
    :root {
      --primary: #1c36b7;
      --primary-dark: #12257f;
      --accent: #d40000;
      --text: #231815;
      --text-light: #5f6470;
      --bg: #d9d9d9;
      --white: #ffffff;
      --line: rgba(0, 0, 0, 0.12);
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.12);
      --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --nav-h: 88px;
      --sidebar-w: 220px;
      --max-width: 1440px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a { text-decoration: none; color: inherit; }
    button, input, textarea, select { font: inherit; }
    .hidden { display: none !important; }
    .container { width: min(var(--max-width), calc(100% - 48px)); margin: 0 auto; }

    .top-nav {
      position: fixed;
      inset: 0 0 auto 0;
      height: var(--nav-h);
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      z-index: 1000;
    }

    .top-nav-inner {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      font-size: clamp(1.6rem, 3vw, 2.6rem);
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--accent);
    }

    .top-links {
      display: flex;
      align-items: center;
      gap: 24px;
      font-weight: 800;
      flex-wrap: wrap;
    }

    .top-links button {
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 800;
    }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 40px;
      background:
        radial-gradient(circle at 20% 18%, rgba(28, 54, 183, 0.08), transparent 20%),
        radial-gradient(circle at 82% 22%, rgba(28, 54, 183, 0.08), transparent 20%),
        linear-gradient(180deg, #ffffff 0%, #eef2fb 100%);
    }

    .login-card {
      width: min(460px, 100%);
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(0,0,0,.06);
      border-radius: var(--radius-xl);
      padding: 42px 34px;
      box-shadow: var(--shadow);
    }

    .login-card h1 {
      font-size: 2.2rem;
      text-align: center;
      margin-bottom: 10px;
    }

    .login-card p {
      text-align: center;
      color: var(--text-light);
      margin-bottom: 28px;
    }

    .login-form {
      display: grid;
      gap: 16px;
    }

    .form-group {
      display: grid;
      gap: 8px;
    }

    .form-group label {
      font-weight: 800;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      min-height: 48px;
      border: 1px solid rgba(0,0,0,.12);
      border-radius: 14px;
      padding: 12px 14px;
      background: #fff;
      outline: none;
    }

    .form-group textarea {
      min-height: 120px;
      resize: vertical;
    }

    .login-actions, .detail-actions, .admin-actions-inline {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 22px;
      border-radius: 999px;
      border: 1px solid transparent;
      cursor: pointer;
      font-weight: 900;
      transition: .25s ease;
    }

    .btn:hover { transform: translateY(-2px); }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 10px 30px rgba(28,54,183,.22);
    }

    .btn-primary:hover { background: var(--primary-dark); }

    .btn-secondary {
      background: #fff;
      color: var(--text);
      border-color: rgba(0,0,0,.1);
    }

    .btn-danger {
      background: #fff1f1;
      color: #b90000;
      border-color: rgba(185,0,0,.12);
    }

    .btn-warning {
      background: #fff6e7;
      color: #8a5300;
      border-color: rgba(138,83,0,.15);
    }

    .order-app, .admin-app {
      padding-top: var(--nav-h);
      min-height: 100vh;
    }

    .order-shell {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: calc(100vh - var(--nav-h));
    }

    .sidebar {
      background: linear-gradient(180deg, #5f6676 0%, #4d5566 100%);
      color: #fff;
      padding: 24px 16px 28px;
      position: sticky;
      top: var(--nav-h);
      height: calc(100vh - var(--nav-h));
      overflow: auto;
    }

    .sidebar-title {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .category-list {
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .category-btn {
      width: 100%;
      border: none;
      background: transparent;
      color: #fff;
      text-align: left;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .category-btn.active,
    .category-btn:hover {
      background: rgba(255,255,255,.16);
    }

    .main-area { min-width: 0; background: var(--bg); }

    .order-topbar, .admin-topbar {
      position: sticky;
      top: var(--nav-h);
      z-index: 100;
      background: rgba(245,247,251,.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }

    .page-title {
      font-size: 1.8rem;
      font-weight: 900;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .search-wrap {
      width: min(340px, 42vw);
      height: 44px;
      border-radius: 999px;
      background: #6d7280;
      display: flex;
      align-items: center;
      padding: 0 14px;
      color: #fff;
    }

    .search-wrap input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
    }

    .search-wrap input::placeholder { color: rgba(255,255,255,.82); }

    .cart-btn {
      position: relative;
      border: none;
      background: #fff;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      font-size: 1.35rem;
    }

    .cart-count {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 20px;
      height: 20px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: .72rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
    }

    .content, .admin-content {
      padding: 26px 24px 34px;
    }

    .section-head {
      margin-bottom: 22px;
    }

    .section-head h2 {
      font-size: 2rem;
      margin-bottom: 6px;
    }

    .section-head p {
      color: var(--text-light);
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 18px;
    }

    .product-card {
      background: #fff;
      border-radius: 20px;
      padding: 14px;
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      transition: .25s ease;
      border: 1px solid transparent;
    }

    .product-card:hover {
      transform: translateY(-6px);
      border-color: rgba(28,54,183,.16);
      box-shadow: var(--shadow);
    }

    .product-thumb {
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      background: linear-gradient(135deg, #edf2fd 0%, #dbe5ff 100%);
      border: 1px solid rgba(28,54,183,.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 1.2rem;
      font-weight: 900;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .product-thumb img,
    .detail-image img,
    .detail-thumb img,
    .admin-product-thumb img,
    .cart-thumb img,
    .history-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-name {
      font-weight: 900;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .product-meta {
      font-size: .92rem;
      color: var(--text-light);
    }

    .detail-view, .history-view {
      display: none;
    }

    .detail-layout {
      background: #fff;
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 30px;
    }

    .detail-gallery {
      display: grid;
      gap: 14px;
    }

    .detail-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 22px;
      background: linear-gradient(135deg, #edf2fd 0%, #dbe5ff 100%);
      border: 1px solid rgba(28,54,183,.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 900;
      color: var(--primary);
      overflow: hidden;
    }

    .detail-thumbs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .detail-thumb {
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid transparent;
      background: #f3f6ff;
      cursor: pointer;
    }

    .detail-thumb.active {
      border-color: var(--primary);
    }

    .detail-info h2 {
      font-size: 2rem;
      margin-bottom: 12px;
    }

    .detail-code {
      color: var(--text-light);
      margin-bottom: 22px;
      font-weight: 700;
    }

    .spec-groups {
      display: grid;
      gap: 14px;
      margin-bottom: 20px;
    }

    .spec-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .spec-label {
      min-width: 62px;
      font-weight: 900;
    }

    .spec-btn {
      border: 1px solid rgba(0,0,0,.12);
      background: #fff;
      border-radius: 999px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: .95rem;
      font-weight: 700;
    }

    .spec-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .qty-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .qty-box {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(0,0,0,.12);
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
    }

    .qty-box button {
      width: 38px;
      height: 38px;
      border: none;
      background: #eef2fb;
      cursor: pointer;
      font-weight: 900;
      color: var(--primary);
    }

    .qty-box span {
      width: 50px;
      text-align: center;
      font-weight: 900;
    }

    .detail-buy-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .detail-desc {
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--text-light);
      white-space: pre-line;
    }

    .history-layout {
      background: #fff;
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .history-list {
      display: grid;
      gap: 18px;
    }

    .history-card {
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 20px;
      background: #f9fbff;
      padding: 18px;
    }

    .history-order-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .history-items {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .history-item {
      background: #fff;
      border-radius: 14px;
      padding: 12px 14px;
      border: 1px solid rgba(28,54,183,.08);
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 12px;
      align-items: center;
    }

    .history-thumb {
      width: 70px;
      height: 70px;
      border-radius: 12px;
      overflow: hidden;
      background: #edf2fd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .9rem;
      color: var(--primary);
      font-weight: 900;
    }

    .admin-layout {
      display: grid;
      gap: 24px;
    }

    .admin-panel, .admin-list-panel {
      background: #fff;
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .admin-panel h2, .admin-list-panel h2 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .admin-panel p, .admin-list-panel p {
      color: var(--text-light);
      margin-bottom: 18px;
    }

    .admin-form {
      display: grid;
      gap: 14px;
    }

    .admin-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .admin-products {
      display: grid;
      gap: 14px;
    }

    .admin-product-row {
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 14px;
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 18px;
      background: #f9fbff;
    }

    .admin-product-thumb {
      width: 100px;
      height: 100px;
      border-radius: 14px;
      background: linear-gradient(135deg, #edf2fd 0%, #dbe5ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-weight: 900;
      overflow: hidden;
    }

    .admin-product-title {
      font-size: 1.08rem;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .admin-product-meta {
      color: var(--text-light);
      font-size: .92rem;
    }

    .edit-image-list {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .edit-image-item {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 8px;
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 12px;
      background: #f8faff;
    }

    .edit-image-thumb {
      width: 64px;
      height: 64px;
      border-radius: 10px;
      overflow: hidden;
      background: #edf2fd;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.24);
      opacity: 0;
      pointer-events: none;
      transition: .28s ease;
      z-index: 1100;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .cart-drawer {
      position: fixed;
      top: 0;
      right: -430px;
      width: min(420px, 100%);
      height: 100vh;
      background: #fff;
      box-shadow: -18px 0 50px rgba(0,0,0,.14);
      z-index: 1200;
      transition: right .34s ease;
      display: flex;
      flex-direction: column;
    }

    .cart-drawer.open { right: 0; }

    .cart-header {
      padding: 22px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cart-header h3 {
      font-size: 1.7rem;
      font-weight: 900;
    }

    .cart-close {
      border: none;
      background: transparent;
      font-size: 1.9rem;
      cursor: pointer;
    }

    .cart-body {
      flex: 1;
      overflow: auto;
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .cart-item {
      background: #f9fbff;
      border: 1px solid rgba(28,54,183,.06);
      border-radius: 18px;
      padding: 14px;
      display: grid;
      grid-template-columns: 76px 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .cart-thumb {
      width: 76px;
      height: 76px;
      border-radius: 14px;
      background: linear-gradient(135deg, #edf2fd 0%, #dbe5ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-weight: 900;
      overflow: hidden;
    }

    .cart-qty {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(0,0,0,.12);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 8px;
      background: #fff;
    }

    .cart-qty button {
      width: 28px;
      height: 28px;
      border: none;
      background: #eef2fb;
      color: var(--primary);
      cursor: pointer;
      font-weight: 900;
    }

    .cart-qty span {
      width: 34px;
      text-align: center;
      font-weight: 900;
    }

    .remove-btn {
      border: none;
      background: transparent;
      color: #b90000;
      font-weight: 900;
      cursor: pointer;
    }

    .cart-footer {
      border-top: 1px solid var(--line);
      padding: 18px 20px 22px;
      display: grid;
      gap: 14px;
      background: #fff;
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 1.08rem;
      font-weight: 900;
    }

    .cart-actions {
      display: flex;
      gap: 12px;
    }

    .cart-actions .btn { flex: 1; }

    .empty-box {
      text-align: center;
      color: var(--text-light);
      padding: 40px 20px;
      background: #fff;
      border-radius: 18px;
      border: 1px dashed rgba(0,0,0,.12);
    }

    @media (max-width: 1200px) {
      .product-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    @media (max-width: 980px) {
      .order-shell { grid-template-columns: 1fr; }
      .sidebar {
        position: relative;
        top: 0;
        height: auto;
      }
      .category-list { grid-template-columns: repeat(4, 1fr); }
      .product-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .detail-layout { grid-template-columns: 1fr; }
      .admin-form-grid { grid-template-columns: 1fr; }
      .admin-product-row { grid-template-columns: 80px 1fr; }
    }

    @media (max-width: 760px) {
      .category-list { grid-template-columns: repeat(2, 1fr); }
      .product-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .search-wrap { width: 100%; }
      .order-topbar, .admin-topbar { flex-wrap: wrap; }
    }

    @media (max-width: 560px) {
      .top-nav { display: none; }
      .order-app, .admin-app { padding-top: 0; }
      .sidebar { display: none; }
      .order-topbar { display: none; }
      .content, .admin-content { padding: 18px 12px 20px; }
      .detail-layout, .history-layout, .admin-panel, .admin-list-panel {
        padding: 18px;
        border-radius: 16px;
      }
      .product-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }
      .cart-drawer {
        width: 100%;
        right: -100%;
      }
      .cart-item {
        grid-template-columns: 70px 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="top-nav">
    <div class="container top-nav-inner">
      <a href="#" class="brand">炳昌</a>
      <nav class="top-links">
        <button type="button" id="goToProductsTop">商品列表</button>
        <button type="button" id="goToHistoryTop">曾經購買過</button>
        <button type="button" id="goToCartTop">購物車</button>
        <button type="button" id="goToAdminTop" class="hidden">後台管理</button>
        <button type="button" id="logoutTopBtn" class="hidden">登出</button>
      </nav>
    </div>
  </header>

  <section class="login-page" id="loginPage">
    <div class="login-card">
      <h1>訂購系統</h1>
      <p>請先登入後進入炳昌訂購平台</p>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="account">帳號</label>
          <input id="account" type="text" placeholder="請輸入帳號" required />
        </div>

        <div class="form-group">
          <label for="password">密碼</label>
          <input id="password" type="password" placeholder="請輸入密碼" required />
        </div>

        <div class="login-actions">
          <button type="submit" class="btn btn-primary" style="flex:1;">登入</button>
        </div>
      </form>
    </div>
  </section>

  <section class="order-app hidden" id="orderApp">
    <div class="order-shell">
      <aside class="sidebar">
        <div class="sidebar-title">商品分類</div>
        <ul class="category-list" id="categoryList"></ul>
      </aside>

      <div class="main-area">
        <div class="order-topbar">
          <div class="page-title" id="pageTitle">商品列表</div>
          <div class="topbar-actions">
            <div class="search-wrap">
              <input type="text" id="searchInput" placeholder="搜尋商品名稱 / 編號" />
            </div>
            <button class="cart-btn" id="openCartBtn" aria-label="購物車">
              🛒
              <span class="cart-count" id="cartCount">0</span>
            </button>
          </div>
        </div>

        <main class="content">
          <section id="productSection">
            <div class="section-head">

          <section class="detail-view" id="detailView">

              <div class="detail-info">
                <h2 id="detailName">商品名稱</h2>
                <div class="detail-code" id="detailCode">商品編號</div>

                <div class="spec-groups">
                  <div class="spec-row">

                  <div class="spec-row">
                    <span class="spec-label">顏色</span>
                    <div id="colorOptions"></div>

                <div class="qty-row">

                    <button type="button" id="qtyMinus">-</button>

                    <button type="button" id="qtyPlus">+</button>

                <div class="detail-buy-actions">
                  <button class="btn btn-primary" id="addToCartBtn">加入購物車</button>
                  <button class="btn btn-secondary" id="buyNowBtn">立即下單</button>

  <section class="admin-app hidden" id="adminApp">

            <form class="admin-form" id="adminProductForm">

                  <label for="adminCode">商品編號</label>
                  <input id="adminCode" type="text" placeholder="例如：C-03" required />

                  <label for="adminImages">新增圖片</label>
                  <input id="adminImages" type="file" accept="image/*" multiple />

                  <label for="adminSizes">尺寸</label>
                  <input id="adminSizes" type="text" placeholder="例如：S,M,L 或 30mm,40mm" />

                <div class="form-group">
                  <label for="adminColors">顏色</label>
                  <input id="adminColors" type="text" placeholder="例如：紅,黑,銀" />
                </div>
              </div>

              <div class="form-group">
                <label for="adminDesc">商品描述</label>
                <textarea id="adminDesc" placeholder="請輸入商品介紹"></textarea>
              </div>

              <div class="form-group hidden" id="existingImagesWrap">
                <label>目前圖片</label>
                <div class="edit-image-list" id="existingImagesList"></div>
              </div>

              <div class="admin-actions-inline">
                <button type="submit" class="btn btn-primary" id="adminSubmitBtn">新增產品</button>
                <button type="button" class="btn btn-secondary" id="adminResetBtn">清空欄位</button>
                <button type="button" class="btn btn-warning hidden" id="adminCancelEditBtn">取消編輯</button>
              </div>
            </form>
          </section>

          <section class="admin-list-panel">
            <h2>目前商品清單</h2>
            <p>管理員可直接編輯或刪除商品。</p>

  <div class="overlay" id="overlay"></div>

  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h3>購物車</h3>
      <button class="cart-close" id="closeCartBtn">×</button>
    </div>

    <div class="cart-body" id="cartBody"></div>

    <div class="cart-footer">
      <div class="cart-total">
        <span>總件數</span>
        <span id="cartTotalQty">0</span>
      </div>

      <div class="cart-actions">
        <button class="btn btn-danger" id="clearCartBtn">清空購物車</button>
        <button class="btn btn-primary" id="checkoutBtn">送出訂單</button>
      </div>
    </div>
  </aside>

  <script>
    const loginPage = document.getElementById("loginPage");
    const orderApp = document.getElementById("orderApp");
    const adminApp = document.getElementById("adminApp");
    const loginForm = document.getElementById("loginForm");

    const categoryList = document.getElementById("categoryList");
    const searchInput = document.getElementById("searchInput");
    const productGrid = document.getElementById("productGrid");
    const sectionTitle = document.getElementById("sectionTitle");
    const pageTitle = document.getElementById("pageTitle");

    const productSection = document.getElementById("productSection");
    const detailView = document.getElementById("detailView");
    const backToListBtn = document.getElementById("backToListBtn");
    const historyView = document.getElementById("historyView");
    const historyList = document.getElementById("historyList");
    const backFromHistoryBtn = document.getElementById("backFromHistoryBtn");

    const detailImage = document.getElementById("detailImage");
    const detailThumbs = document.getElementById("detailThumbs");
    const detailName = document.getElementById("detailName");
    const detailCode = document.getElementById("detailCode");
    const detailDesc = document.getElementById("detailDesc");
    const sizeOptions = document.getElementById("sizeOptions");
    const colorOptions = document.getElementById("colorOptions");
    const qtyValue = document.getElementById("qtyValue");
    const qtyMinus = document.getElementById("qtyMinus");
    const qtyPlus = document.getElementById("qtyPlus");
    const addToCartBtn = document.getElementById("addToCartBtn");
    const buyNowBtn = document.getElementById("buyNowBtn");

    const openCartBtn = document.getElementById("openCartBtn");
    const closeCartBtn = document.getElementById("closeCartBtn");
    const cartDrawer = document.getElementById("cartDrawer");
    const overlay = document.getElementById("overlay");
    const cartBody = document.getElementById("cartBody");
    const cartCount = document.getElementById("cartCount");
    const cartTotalQty = document.getElementById("cartTotalQty");
    const clearCartBtn = document.getElementById("clearCartBtn");
    const checkoutBtn = document.getElementById("checkoutBtn");

    const goToProductsTop = document.getElementById("goToProductsTop");
    const goToHistoryTop = document.getElementById("goToHistoryTop");
    const goToCartTop = document.getElementById("goToCartTop");
    const goToAdminTop = document.getElementById("goToAdminTop");
    const logoutTopBtn = document.getElementById("logoutTopBtn");

    const adminProductForm = document.getElementById("adminProductForm");
    const adminProductsList = document.getElementById("adminProductsList");
    const adminBackToShopBtn = document.getElementById("adminBackToShopBtn");
    const adminLogoutBtn = document.getElementById("adminLogoutBtn");
    const adminResetBtn = document.getElementById("adminResetBtn");
    const adminCancelEditBtn = document.getElementById("adminCancelEditBtn");
    const adminPanelTitle = document.getElementById("adminPanelTitle");
    const adminSubmitBtn = document.getElementById("adminSubmitBtn");

    const adminCategory = document.getElementById("adminCategory");
    const adminName = document.getElementById("adminName");
    const adminCode = document.getElementById("adminCode");
    const adminImages = document.getElementById("adminImages");
    const adminSizes = document.getElementById("adminSizes");
    const adminColors = document.getElementById("adminColors");
    const adminDesc = document.getElementById("adminDesc");
    const existingImagesWrap = document.getElementById("existingImagesWrap");
    const existingImagesList = document.getElementById("existingImagesList");

    let products = [];
    let currentCategory = "全部";
    let currentSearch = "";
    let selectedProduct = null;
    let selectedSize = "";
    let selectedColor = "";
    let selectedQty = 1;
    let currentDetailImageIndex = 0;
    let cart = [];
    let currentUser = "";
    let isAdminUser = false;
    let adminAccount = "";
    let adminPassword = "";
    let editingProductId = null;
    let editingKeepImages = [];

    function escapeHTML(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function parseCommaValues(text) {
      return text
        .split(",")
        .map(item => item.trim())
        .filter(Boolean);
    }

    function getProductImages(product) {
      return Array.isArray(product.images) ? product.images.filter(Boolean) : [];
    }

    function getFirstProductImage(product) {
      return getProductImages(product)[0] || "";
    }

    function getProductThumbHTML(product) {
      const firstImage = getFirstProductImage(product);
      if (firstImage) {
        return `<img src="${escapeHTML(firstImage)}" alt="${escapeHTML(product.name)}">`;
      }
      return escapeHTML(product.imageText || "商品圖");
    }

    async function adminLogin(account, password) {
      const res = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ account, password })
      });

      const contentType = res.headers.get("content-type") || "";
      if (!contentType.includes("application/json")) {
        throw new Error("管理員登入回傳格式錯誤");
      }

      return await res.json();
    }

    async function fetchProducts() {
      try {
        const res = await fetch("/api/products");

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const contentType = res.headers.get("content-type") || "";
        if (!contentType.includes("application/json")) {
          throw new Error("伺服器未回傳 JSON");
        }

        const data = await res.json();
        if (!data.success) {
          throw new Error(data.message || "讀取商品失敗");
        }

        products = data.products || [];
        refreshAllProductRelatedUI();
      } catch (error) {
        console.error("讀取商品失敗:", error);
        alert("讀取商品失敗，請確認 server.js 是否已正常啟動");
      }
    }

    async function fetchOrderHistory() {
      if (!currentUser) return [];

      try {
        const res = await fetch(`/api/orders/${encodeURIComponent(currentUser)}`);

        if (!res.ok) {
          console.error("讀取歷史訂單失敗，HTTP 狀態碼：", res.status);
          return [];
        }

        const contentType = res.headers.get("content-type") || "";
        if (!contentType.includes("application/json")) {
          console.error("歷史訂單回傳內容不是 JSON");
          return [];
        }

        const data = await res.json();
        if (!data.success) return [];

        return data.orders || [];
      } catch (error) {
        console.error("讀取歷史訂單失敗:", error);
        return [];
      }
    }

    function getUniqueCategories() {
      return ["全部", ...new Set(products.map(item => item.category).filter(Boolean))];
    }

    function updateAdminButtonsVisibility() {
      if (isAdminUser) {
        goToAdminTop.classList.remove("hidden");
      } else {
        goToAdminTop.classList.add("hidden");
      }

      if (currentUser) {
        logoutTopBtn.classList.remove("hidden");
      } else {
        logoutTopBtn.classList.add("hidden");
      }
    }

    function refreshAllProductRelatedUI() {
      renderCategories();
      renderProducts();
      renderAdminProducts();
    }

    function renderCategories() {
      const categories = getUniqueCategories();
      if (!categories.includes(currentCategory)) currentCategory = "全部";

      categoryList.innerHTML = "";
      categories.forEach(category => {
        const li = document.createElement("li");
        const btn = document.createElement("button");
        btn.className = "category-btn";
        if (category === currentCategory) btn.classList.add("active");
        btn.textContent = category;

        btn.addEventListener("click", () => {
          currentCategory = category;
          renderCategories();
          renderProducts();
          showProductList();
        });

        li.appendChild(btn);
        categoryList.appendChild(li);
      });
    }

    function getFilteredProducts() {
      const keyword = currentSearch.toLowerCase();

      return products.filter(product => {
        const categoryMatch = currentCategory === "全部" || product.category === currentCategory;
        const searchMatch =
          String(product.name || "").toLowerCase().includes(keyword) ||
          String(product.code || "").toLowerCase().includes(keyword) ||
          String(product.category || "").toLowerCase().includes(keyword);

        return categoryMatch && searchMatch;
      });
    }

    function renderProducts() {
      const filtered = getFilteredProducts();
      const title = currentCategory === "全部" ? "商品列表" : currentCategory;

      sectionTitle.textContent = title;
      pageTitle.textContent = title;
      productGrid.innerHTML = "";

      if (!filtered.length) {
        productGrid.innerHTML = `<div class="empty-box">找不到符合條件的商品</div>`;
        return;
      }

      filtered.forEach(product => {
        const card = document.createElement("div");
        card.className = "product-card";
        card.innerHTML = `
          <div class="product-thumb">${getProductThumbHTML(product)}</div>
          <div class="product-name">${escapeHTML(product.name)}</div>
          <div class="product-meta">分類：${escapeHTML(product.category)}</div>
          <div class="product-meta">編號：${escapeHTML(product.code)}</div>
        `;
        card.addEventListener("click", () => openProductDetail(product.id));
        productGrid.appendChild(card);
      });
    }

    function renderOptionButtons(container, options, activeValue, onClick) {
      container.innerHTML = "";

      options.forEach(option => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "spec-btn";
        if (option === activeValue) btn.classList.add("active");
        btn.textContent = option;
        btn.addEventListener("click", () => onClick(option));
        container.appendChild(btn);
      });
    }

    function renderDetailThumbs(product) {
      const images = getProductImages(product);
      detailThumbs.innerHTML = "";
      if (!images.length) return;

      images.forEach((src, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "detail-thumb";
        if (index === currentDetailImageIndex) btn.classList.add("active");
        btn.innerHTML = `<img src="${escapeHTML(src)}" alt="${escapeHTML(product.name)}">`;
        btn.addEventListener("click", () => setDetailMainImage(product, index));
        detailThumbs.appendChild(btn);
      });
    }

    function setDetailMainImage(product, index) {
      const images = getProductImages(product);
      currentDetailImageIndex = index;

      if (images[index]) {
        detailImage.innerHTML = `<img src="${escapeHTML(images[index])}" alt="${escapeHTML(product.name)}">`;
      } else {
        detailImage.textContent = product.imageText || "商品圖";
      }

      renderDetailThumbs(product);
    }

    function openProductDetail(productId) {
      const product = products.find(p => Number(p.id) === Number(productId));
      if (!product) return;

      selectedProduct = product;
      selectedSize = (product.sizes && product.sizes[0]) || "";
      selectedColor = (product.colors && product.colors[0]) || "";
      selectedQty = 1;
      currentDetailImageIndex = 0;

      setDetailMainImage(product, 0);
      detailName.textContent = product.name;
      detailCode.textContent = `商品編號：${product.code}`;
      detailDesc.textContent = `商品分類：${product.category}\n\n${product.description || ""}`;
      qtyValue.textContent = selectedQty;

      const setSize = (value) => {
        selectedSize = value;
        renderOptionButtons(sizeOptions, product.sizes || [], selectedSize, setSize);
      };

      const setColor = (value) => {
        selectedColor = value;
        renderOptionButtons(colorOptions, product.colors || [], selectedColor, setColor);
      };

      renderOptionButtons(sizeOptions, product.sizes || [], selectedSize, setSize);
      renderOptionButtons(colorOptions, product.colors || [], selectedColor, setColor);

      productSection.style.display = "none";
      historyView.style.display = "none";
      detailView.style.display = "block";
      pageTitle.textContent = "商品詳細";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showProductList() {
      detailView.style.display = "none";
      historyView.style.display = "none";
      productSection.style.display = "block";
      pageTitle.textContent = currentCategory === "全部" ? "商品列表" : currentCategory;
    }

    function addToCart(product, size, color, qty) {
      const normalizedSize = size || "";
      const normalizedColor = color || "";

      const existed = cart.find(item =>
        Number(item.id) === Number(product.id) &&
        item.size === normalizedSize &&
        item.color === normalizedColor
      );

      if (existed) {
        existed.qty += qty;
      } else {
        cart.push({
          id: product.id,
          name: product.name,
          code: product.code,
          imageText: product.imageText || "商品圖",
          image: getFirstProductImage(product),
          size: normalizedSize,
          color: normalizedColor,
          qty
        });
      }

      renderCart();
    }

    function renderCart() {
      cartBody.innerHTML = "";

      if (!cart.length) {
        cartBody.innerHTML = `<div class="empty-box">購物車目前沒有商品</div>`;
      } else {
        cart.forEach((item, index) => {
          const div = document.createElement("div");
          div.className = "cart-item";
          div.innerHTML = `
            <div class="cart-thumb">
              ${item.image ? `<img src="${escapeHTML(item.image)}" alt="${escapeHTML(item.name)}">` : escapeHTML(item.imageText)}
            </div>
            <div>
              <h4>${escapeHTML(item.name)}</h4>
              <div class="product-meta">編號：${escapeHTML(item.code)}</div>
              <div class="product-meta">尺寸：${escapeHTML(item.size || "-")} / 顏色：${escapeHTML(item.color || "-")}</div>
              <div class="cart-qty">
                <button type="button" data-action="minus" data-index="${index}">-</button>
                <span>${item.qty}</span>
                <button type="button" data-action="plus" data-index="${index}">+</button>
              </div>
            </div>
            <button class="remove-btn" data-action="remove" data-index="${index}">刪除</button>
          `;
          cartBody.appendChild(div);
        });
      }

      const totalQty = cart.reduce((sum, item) => sum + Number(item.qty || 0), 0);
      cartCount.textContent = totalQty;
      cartTotalQty.textContent = totalQty;
    }

    async function renderHistory() {
      historyList.innerHTML = "";
      const orders = await fetchOrderHistory();

      if (!orders.length) {
        historyList.innerHTML = `<div class="empty-box">目前還沒有購買紀錄</div>`;
        return;
      }

      orders.forEach(order => {
        const card = document.createElement("div");
        card.className = "history-card";

        const itemsHtml = (order.items || []).map(item => `
          <div class="history-item">
            <div class="history-thumb">
              ${item.product_image ? `<img src="${escapeHTML(item.product_image)}" alt="${escapeHTML(item.product_name)}">` : "商品圖"}
            </div>
            <div>
              <div><strong>${escapeHTML(item.product_name)}</strong></div>
              <div class="product-meta">編號：${escapeHTML(item.product_code)}</div>
              <div class="product-meta">尺寸：${escapeHTML(item.size || "-")} / 顏色：${escapeHTML(item.color || "-")} / 數量：${item.qty}</div>
            </div>
          </div>
        `).join("");

        card.innerHTML = `
          <div class="history-order-top">
            <div><strong>訂單編號：${order.id}</strong></div>
            <div class="product-meta">${escapeHTML(order.createdAt)}</div>
          </div>
          <div class="product-meta" style="margin-bottom:12px;">狀態：${escapeHTML(order.status || "待處理")}</div>
          <div class="history-items">${itemsHtml}</div>
          <div class="detail-actions">
            <button class="btn btn-primary" data-order-id="${order.id}">再次購買這筆訂單</button>
          </div>
        `;

        historyList.appendChild(card);
      });
    }

    async function showHistoryView() {
      productSection.style.display = "none";
      detailView.style.display = "none";
      historyView.style.display = "block";
      pageTitle.textContent = "曾經購買過";
      await renderHistory();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function rebuyOrder(orderId) {
      const orders = await fetchOrderHistory();
      const target = orders.find(item => Number(item.id) === Number(orderId));
      if (!target) return;

      target.items.forEach(orderItem => {
        const product = products.find(p => Number(p.id) === Number(orderItem.product_id));
        if (product) {
          addToCart(product, orderItem.size || "", orderItem.color || "", Number(orderItem.qty) || 1);
        }
      });

      openCart();
    }

    function openCart() {
      cartDrawer.classList.add("open");
      overlay.classList.add("show");
    }

    function closeCart() {
      cartDrawer.classList.remove("open");
      overlay.classList.remove("show");
    }

    function closeAllPanels() {
      closeCart();
    }

    function resetAdminForm() {
      adminProductForm.reset();
      existingImagesList.innerHTML = "";
    }

    function enterAddMode() {
      editingProductId = null;
      editingKeepImages = [];
      adminPanelTitle.textContent = "新增產品";
      adminSubmitBtn.textContent = "新增產品";
      adminCancelEditBtn.classList.add("hidden");
      existingImagesWrap.classList.add("hidden");
      resetAdminForm();
    }

    function renderExistingImagesEditor() {
      existingImagesList.innerHTML = "";

      if (!editingKeepImages.length) {
        existingImagesWrap.classList.add("hidden");
        return;
      }

      existingImagesWrap.classList.remove("hidden");

      editingKeepImages.forEach((img, index) => {
        const item = document.createElement("div");
        item.className = "edit-image-item";
        item.innerHTML = `
          <div class="edit-image-thumb"><img src="${escapeHTML(img)}" alt="圖片${index + 1}"></div>
          <div class="product-meta">${escapeHTML(img)}</div>
          <button type="button" class="btn btn-danger" data-remove-existing-image="${index}">移除</button>
        `;
        existingImagesList.appendChild(item);
      });
    }

    function enterEditMode(product) {
      editingProductId = Number(product.id);
      editingKeepImages = [...getProductImages(product)];

      adminPanelTitle.textContent = "編輯產品";
      adminSubmitBtn.textContent = "儲存修改";
      adminCancelEditBtn.classList.remove("hidden");

      adminCategory.value = product.category || "";
      adminName.value = product.name || "";
      adminCode.value = product.code || "";
      adminSizes.value = (product.sizes || []).join(",");
      adminColors.value = (product.colors || []).join(",");
      adminDesc.value = product.description || "";

      renderExistingImagesEditor();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderAdminProducts() {
      adminProductsList.innerHTML = "";

      if (!products.length) {
        adminProductsList.innerHTML = `<div class="empty-box">目前沒有商品</div>`;
        return;
      }

      products.forEach(product => {
        const row = document.createElement("div");
        row.className = "admin-product-row";
        row.innerHTML = `
          <div class="admin-product-thumb">${getProductThumbHTML(product)}</div>
          <div>
            <div class="admin-product-title">${escapeHTML(product.name)}</div>
            <div class="admin-product-meta">分類：${escapeHTML(product.category)}</div>
            <div class="admin-product-meta">編號：${escapeHTML(product.code)}</div>
            <div class="admin-product-meta">圖片數：${getProductImages(product).length}</div>
            <div class="admin-product-meta">尺寸：${escapeHTML((product.sizes || []).join(", ") || "-")}</div>
            <div class="admin-product-meta">顏色：${escapeHTML((product.colors || []).join(", ") || "-")}</div>
          </div>
          <div class="detail-actions">
            <button class="btn btn-secondary" data-edit-product="${product.id}">編輯商品</button>
            <button class="btn btn-danger" data-delete-product="${product.id}">刪除商品</button>
          </div>
        `;
        adminProductsList.appendChild(row);
      });
    }

    async function createProduct() {
      const formData = new FormData();
      formData.append("adminAccount", adminAccount);
      formData.append("adminPassword", adminPassword);
      formData.append("category", adminCategory.value.trim());
      formData.append("name", adminName.value.trim());
      formData.append("code", adminCode.value.trim());
      formData.append("description", adminDesc.value.trim());
      formData.append("sizes", JSON.stringify(parseCommaValues(adminSizes.value.trim()).length ? parseCommaValues(adminSizes.value.trim()) : ["標準"]));
      formData.append("colors", JSON.stringify(parseCommaValues(adminColors.value.trim()).length ? parseCommaValues(adminColors.value.trim()) : ["標準"]));
      formData.append("imageText", "商品圖");

      for (const file of adminImages.files) {
        formData.append("images", file);
      }

      const res = await fetch("/api/products", {
        method: "POST",
        body: formData
      });

      return await res.json();
    }

    async function updateProduct() {
      const formData = new FormData();
      formData.append("adminAccount", adminAccount);
      formData.append("adminPassword", adminPassword);
      formData.append("category", adminCategory.value.trim());
      formData.append("name", adminName.value.trim());
      formData.append("code", adminCode.value.trim());
      formData.append("description", adminDesc.value.trim());
      formData.append("sizes", JSON.stringify(parseCommaValues(adminSizes.value.trim()).length ? parseCommaValues(adminSizes.value.trim()) : ["標準"]));
      formData.append("colors", JSON.stringify(parseCommaValues(adminColors.value.trim()).length ? parseCommaValues(adminColors.value.trim()) : ["標準"]));
      formData.append("imageText", "商品圖");
      formData.append("keepImages", JSON.stringify(editingKeepImages));

      for (const file of adminImages.files) {
        formData.append("images", file);
      }

      const res = await fetch(`/api/products/${editingProductId}`, {
        method: "PUT",
        body: formData
      });

      return await res.json();
    }

    async function deleteProduct(productId) {
      const product = products.find(item => Number(item.id) === Number(productId));
      if (!product) return;

      const confirmed = confirm(`確定要刪除商品「${product.name}」嗎？`);
      if (!confirmed) return;

      const res = await fetch(`/api/products/${productId}/delete`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          adminAccount,
          adminPassword
        })
      });

      const data = await res.json();
      if (!data.success) {
        alert(data.message || "刪除失敗");
        return;
      }

      alert("商品已刪除");
      await fetchProducts();

      if (editingProductId === Number(productId)) {
        enterAddMode();
      }
    }

    async function checkout() {
      if (!currentUser) {
        alert("請先登入");
        return;
      }

      if (!cart.length) {
        alert("購物車目前沒有商品");
        return;
      }

      try {
        const res = await fetch("/api/orders", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: currentUser,
            items: cart
          })
        });

        const contentType = res.headers.get("content-type") || "";
        if (!contentType.includes("application/json")) {
          throw new Error("訂單送出失敗，伺服器未回傳 JSON");
        }

        const data = await res.json();
        if (!data.success) {
          alert(data.message || "訂單送出失敗");
          return;
        }

        alert(`訂單已送出，訂單編號：${data.orderId}`);
        cart = [];
        renderCart();
        closeCart();
      } catch (error) {
        console.error("訂單送出失敗:", error);
        alert("訂單送出失敗，請確認後端是否正常");
      }
    }

    function showAdminApp() {
      loginPage.classList.add("hidden");
      orderApp.classList.add("hidden");
      adminApp.classList.remove("hidden");
      updateAdminButtonsVisibility();
      renderAdminProducts();
      closeAllPanels();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showShopApp() {
      loginPage.classList.add("hidden");
      adminApp.classList.add("hidden");
      orderApp.classList.remove("hidden");
      updateAdminButtonsVisibility();
      renderCart();
      showProductList();
      closeAllPanels();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function handleLogout() {
      currentUser = "";
      isAdminUser = false;
      adminAccount = "";
      adminPassword = "";
      cart = [];
      selectedProduct = null;
      currentSearch = "";
      currentCategory = "全部";
      searchInput.value = "";
      enterAddMode();
      renderCart();
      loginForm.reset();
      orderApp.classList.add("hidden");
      adminApp.classList.add("hidden");
      loginPage.classList.remove("hidden");
      updateAdminButtonsVisibility();
      closeAllPanels();
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const accountInput = document.getElementById("account").value.trim();
      const passwordInput = document.getElementById("password").value.trim();

      if (!accountInput || !passwordInput) {
        alert("請輸入帳號與密碼");
        return;
      }

      currentUser = accountInput;
      isAdminUser = false;
      adminAccount = "";
      adminPassword = "";

      try {
        if (accountInput === "c417") {
          const result = await adminLogin(accountInput, passwordInput);

          if (!result.success) {
            alert(result.message || "管理員登入失敗");
            return;
          }

          isAdminUser = true;
          adminAccount = accountInput;
          adminPassword = passwordInput;

          await fetchProducts();
          showAdminApp();
          return;
        }

        await fetchProducts();
        showShopApp();
      } catch (error) {
        console.error("登入失敗:", error);
        alert("登入失敗，請確認伺服器是否正常啟動");
      }
    });

    searchInput.addEventListener("input", (e) => {
      currentSearch = e.target.value.trim();
      renderProducts();
      showProductList();
    });

    backToListBtn.addEventListener("click", showProductList);
    backFromHistoryBtn.addEventListener("click", showProductList);

    qtyMinus.addEventListener("click", () => {
      if (selectedQty > 1) {
        selectedQty--;
        qtyValue.textContent = selectedQty;
      }
    });

    qtyPlus.addEventListener("click", () => {
      selectedQty++;
      qtyValue.textContent = selectedQty;
    });

    addToCartBtn.addEventListener("click", () => {
      if (!selectedProduct) return;
      addToCart(selectedProduct, selectedSize, selectedColor, selectedQty);
      openCart();
    });

    buyNowBtn.addEventListener("click", () => {
      if (!selectedProduct) return;
      addToCart(selectedProduct, selectedSize, selectedColor, selectedQty);
      openCart();
    });

    openCartBtn.addEventListener("click", openCart);
    closeCartBtn.addEventListener("click", closeCart);
    overlay.addEventListener("click", closeAllPanels);

    clearCartBtn.addEventListener("click", () => {
      cart = [];
      renderCart();
    });

    checkoutBtn.addEventListener("click", checkout);

    cartBody.addEventListener("click", (e) => {
      const target = e.target;
      const action = target.dataset.action;
      const index = Number(target.dataset.index);

      if (Number.isNaN(index) || !cart[index]) return;

      if (action === "minus") {
        if (cart[index].qty > 1) {
          cart[index].qty--;
        } else {
          cart.splice(index, 1);
        }
      } else if (action === "plus") {
        cart[index].qty++;
      } else if (action === "remove") {
        cart.splice(index, 1);
      }

      renderCart();
    });

    historyList.addEventListener("click", async (e) => {
      const orderId = e.target.dataset.orderId;
      if (!orderId) return;
      await rebuyOrder(orderId);
    });

    goToProductsTop.addEventListener("click", async () => {
      if (!currentUser) return;
      if (!products.length) await fetchProducts();
      showShopApp();
    });

    goToHistoryTop.addEventListener("click", async () => {
      if (!currentUser) return;
      if (!products.length) await fetchProducts();
      showShopApp();
      await showHistoryView();
    });

    goToCartTop.addEventListener("click", async () => {
      if (!currentUser) return;
      if (!products.length) await fetchProducts();
      showShopApp();
      openCart();
    });

    goToAdminTop.addEventListener("click", async () => {
      if (!isAdminUser) return;
      if (!products.length) await fetchProducts();
      showAdminApp();
    });

    logoutTopBtn.addEventListener("click", handleLogout);
    adminBackToShopBtn.addEventListener("click", showShopApp);
    adminLogoutBtn.addEventListener("click", handleLogout);

    adminResetBtn.addEventListener("click", () => {
      if (editingProductId !== null) {
        const product = products.find(p => Number(p.id) === Number(editingProductId));
        if (product) {
          enterEditMode(product);
          return;
        }
      }
      resetAdminForm();
    });

    adminCancelEditBtn.addEventListener("click", enterAddMode);

    adminProductForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!adminCategory.value.trim() || !adminName.value.trim() || !adminCode.value.trim()) {
        alert("請至少填寫分類、商品名稱、商品編號");
        return;
      }

      try {
        let data;
        if (editingProductId === null) {
          data = await createProduct();
        } else {
          data = await updateProduct();
        }

        if (!data.success) {
          alert(data.message || "操作失敗");
          return;
        }

        alert(data.message || "完成");
        enterAddMode();
        await fetchProducts();
      } catch (error) {
        console.error("商品操作失敗:", error);
        alert("商品操作失敗，請確認伺服器是否正常");
      }
    });

    existingImagesList.addEventListener("click", (e) => {
      const index = Number(e.target.dataset.removeExistingImage);
      if (Number.isNaN(index)) return;
      editingKeepImages.splice(index, 1);
      renderExistingImagesEditor();
    });

    adminProductsList.addEventListener("click", async (e) => {
      const editId = Number(e.target.dataset.editProduct);
      const deleteId = Number(e.target.dataset.deleteProduct);

      if (!Number.isNaN(editId)) {
        const product = products.find(item => Number(item.id) === editId);
        if (product) enterEditMode(product);
        return;
      }

      if (!Number.isNaN(deleteId)) {
        await deleteProduct(deleteId);
      }
    });

    window.addEventListener("resize", () => {
      if (window.innerWidth > 560) {
        overlay.classList.remove("show");
      }
    });

    updateAdminButtonsVisibility();
    enterAddMode();
  </script>
</body>
</html>
